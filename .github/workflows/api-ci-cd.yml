name: KMS API — CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'

jobs:

  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - name: Build
        run: dotnet build --no-restore -c Release
      - name: Publish
        run: dotnet publish src/Kindergarten.Api/Kindergarten.Api.csproj -c Release -o ./publish
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kms-api
          path: ./publish

  deploy-staging:
    name: Deploy → Staging
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - uses: actions/download-artifact@v4
        with:
          name: kms-api
          path: ./publish
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Run EF Migrations Staging
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet tool install --global dotnet-ef
          dotnet ef database update --project src/Kindergarten.Infrastructure/Kindergarten.Infrastructure.csproj --startup-project src/Kindergarten.Api/Kindergarten.Api.csproj
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.SQL_CONNECTION_STAGING }}
      - name: Deploy to Staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_STAGING }}
          package: ./publish

  deploy-prod:
    name: Deploy → Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Restore
        run: dotnet restore
      - uses: actions/download-artifact@v4
        with:
          name: kms-api
          path: ./publish
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - name: Run EF Migrations Production
        run: |
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet tool install --global dotnet-ef
          dotnet ef database update --project src/Kindergarten.Infrastructure/Kindergarten.Infrastructure.csproj --startup-project src/Kindergarten.Api/Kindergarten.Api.csproj
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.SQL_CONNECTION_PROD }}
      - name: Deploy to Production
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_PROD }}
          package: ./publish
