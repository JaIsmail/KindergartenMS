name: KMS MAUI — Android CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - 'src/Kindergarten.Maui/**'
      - '.github/workflows/maui-ci-cd.yml'
  workflow_dispatch:

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH: 'src/Kindergarten.Maui/Kindergarten.Maui.csproj'

jobs:
  build-android:
    name: Build Android APK
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install MAUI workload
        run: dotnet workload install maui-android

      - name: Restore MAUI project
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build Android APK (Debug)
        run: |
          dotnet build ${{ env.PROJECT_PATH }} `
            -f net9.0-android `
            -c Debug `
            -p:AndroidBuildApplicationPackage=true

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: kms-android-debug
          path: |
            **/*.apk
            **/*.aab
          retention-days: 7
